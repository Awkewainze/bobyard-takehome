services:
  db:
    image: postgres
    ports:
      - ${POSTGRES_PORT}:5432
    env_file: .env
    volumes:
      - ./db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  web:
    image: oven/bun
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bun ci && bun run start
    volumes:
      - ./app:/app
    ports:
      - "${BUN_PORT}:${BUN_PORT}"
